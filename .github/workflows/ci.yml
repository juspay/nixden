name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  x86-lima-workflow:
    runs-on: x86_64-linux
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
      NIXPKGS_ALLOW_INSECURE: "1"
      DEVBOX_ARTIFACTS_DIR: /tmp/devbox-artifacts-${{ github.run_id }}
      DEVBOX_EXCHANGE_DIR: /tmp/devbox-exchange-${{ github.run_id }}
      DEVBOX_KEEP_FAILED_VM: "1"
      DEVBOX_VM: devbox-ci-x86
    steps:
      - uses: actions/checkout@v4

      - name: Install CI tools
        run: |
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.nix-profile/bin:$PATH"
          missing_tools=()
          command -v just >/dev/null || missing_tools+=(nixpkgs#just)
          command -v awk >/dev/null || missing_tools+=(nixpkgs#gawk)
          command -v sed >/dev/null || missing_tools+=(nixpkgs#gnused)
          command -v ssh-keygen >/dev/null || missing_tools+=(nixpkgs#openssh)
          if [ "${#missing_tools[@]}" -gt 0 ]; then
            nix profile install "${missing_tools[@]}"
          fi
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/limactl" <<'EOF'
          #!/usr/bin/env bash
          exec nix shell --impure nixpkgs#lima -c limactl "$@"
          EOF
          chmod +x "$RUNNER_TEMP/bin/limactl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          cat > "$RUNNER_TEMP/bin/qemu-system-x86_64-tcg" <<'EOF'
          #!/usr/bin/env bash
          args=()
          for arg in "$@"; do
            args+=("${arg//q35,accel=kvm/q35,accel=tcg}")
          done
          exec nix shell --impure nixpkgs#qemu -c qemu-system-x86_64 "${args[@]}"
          EOF
          chmod +x "$RUNNER_TEMP/bin/qemu-system-x86_64-tcg"
          echo "QEMU_SYSTEM_X86_64=$RUNNER_TEMP/bin/qemu-system-x86_64-tcg" >> "$GITHUB_ENV"

      - name: Build image through justfile workflow
        run: just --set cpus 4 --set memory 8 --set disk 40 build-image "$DEVBOX_VM"

      - name: Boot image through justfile workflow
        run: just --set cpus 4 --set memory 8 --set disk 40 start "$DEVBOX_VM"

      - name: Smoke test VM
        run: |
          limactl shell "$DEVBOX_VM" -- sh -lc "
            set -eu
            test \"\$(uname -m)\" = x86_64
            command -v direnv
            command -v gh
            command -v btop
          "

      - name: Dump Lima logs
        if: failure()
        run: |
          for vm in "$DEVBOX_VM" "$DEVBOX_VM-builder"; do
            dir="$HOME/.lima/$vm"
            if [ -d "$dir" ]; then
              echo "::group::Lima logs for $vm"
              find "$dir" -maxdepth 1 -type f \( -name '*.log' -o -name '*.stderr' -o -name '*.err' \) -print -exec sed -n '1,240p' {} \;
              echo "::endgroup::"
            fi
          done

      - name: Cleanup Lima VMs
        if: always()
        run: |
          limactl delete --force "$DEVBOX_VM" || true
          limactl delete --force "$DEVBOX_VM-builder" || true
          rm -rf "$DEVBOX_ARTIFACTS_DIR" "$DEVBOX_EXCHANGE_DIR"
