name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: x86_64-linux
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
    steps:
      - uses: actions/checkout@v4

      - name: nix flake check
        run: nix flake check --show-trace

      - name: eval NixOS system
        run: nix eval --raw .#nixosConfigurations.devbox.config.system.build.toplevel.drvPath
