name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  x86-lima-workflow:
    runs-on: x86_64-linux
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        accept-flake-config = true
      NIXPKGS_ALLOW_INSECURE: "1"
      DEVBOX_ARTIFACTS_DIR: /tmp/devbox-artifacts-${{ github.run_id }}
      DEVBOX_EXCHANGE_DIR: /tmp/devbox-exchange-${{ github.run_id }}
      DEVBOX_VM: devbox-ci-x86
    steps:
      - uses: actions/checkout@v4

      - name: Install CI tools
        run: |
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.nix-profile/bin:$PATH"
          command -v just >/dev/null || nix profile install nixpkgs#just
          if ! command -v limactl >/dev/null; then
            mkdir -p "$RUNNER_TEMP/bin"
            cat > "$RUNNER_TEMP/bin/limactl" <<'EOF'
          #!/usr/bin/env bash
          exec nix shell --impure nixpkgs#lima -c limactl "$@"
          EOF
            chmod +x "$RUNNER_TEMP/bin/limactl"
            echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          fi

      - name: Build image through justfile workflow
        run: just --set cpus 4 --set memory 8 --set disk 40 build-image "$DEVBOX_VM"

      - name: Boot image through justfile workflow
        run: just --set cpus 4 --set memory 8 --set disk 40 start "$DEVBOX_VM"

      - name: Smoke test VM
        run: |
          limactl shell "$DEVBOX_VM" -- sh -lc "
            set -eu
            test \"\$(uname -m)\" = x86_64
            command -v direnv
            command -v gh
            command -v btop
          "

      - name: Cleanup Lima VMs
        if: always()
        run: |
          limactl delete --force "$DEVBOX_VM" || true
          limactl delete --force "$DEVBOX_VM-builder" || true
          rm -rf "$DEVBOX_ARTIFACTS_DIR" "$DEVBOX_EXCHANGE_DIR"
